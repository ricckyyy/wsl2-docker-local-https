server {
    listen 8443 ssl;
    server_name test.example.local;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    location / {
        return 200 'Hello from test.example.local:8443\n';
        add_header Content-Type text/plain;
    }
}
